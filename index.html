<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caro & Suri</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #606112;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, serif;
      overflow-x: hidden;
    }

    .frame-container {
      position: relative;
      width: min(100vw, 480px);
      max-height: 100vh;
    }

    .frame-container img.frame {
      display: block;
      width: 100%;
      height: auto;
      position: relative;
      z-index: 2;
      pointer-events: none;
    }

    .video-wrapper {
      position: absolute;
      /* Position to align with the black rectangle in the frame image */
      top: 22.5%;
      left: 24%;
      width: 52%;
      height: 55%;
      z-index: 1;
      overflow: hidden;
    }

    .video-wrapper video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }
  </style>
</head>
<body>

<div class="frame-container">
  <img class="frame" src="frame.png" alt="Floral frame" />
  <div class="video-wrapper">
    <video id="vid" autoplay playsinline controls>
      <source src="caroNSuri.mov" type="video/mp4" />
      Your browser does not support the video tag.
    </video>
  </div>
</div>

<script>
  // Try to autoplay with sound; browsers may block unmuted autoplay
  const vid = document.getElementById('vid');
  vid.muted = false;
  vid.play().catch(() => {
    // If blocked, start muted then unmute on first tap
    vid.muted = true;
    vid.play();
    document.addEventListener('click', () => {
      vid.muted = false;
    }, { once: true });
  });
</script>
</body>
</html>
